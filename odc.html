<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Manifest PDF Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f4f7f6;
      color: #333;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    h2 {
      margin-top: 0;
      color: #2c3e50;
      border-bottom: 2px solid #ecf0f1;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    input[type="number"],
    select {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      background-color: #fff;
    }

    button {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #2980b9;
    }

    /* Dynamic Grid Layouts depending on selected type */
    .student-row {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .manifest-transport {
      grid-template-columns: 2fr 2fr 2fr;
    }

    .manifest-payment {
      grid-template-columns: 1fr;
    }

    #studentInputsSection {
      margin-top: 25px;
      padding-top: 25px;
      border-top: 2px solid #ecf0f1;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Hotel Manifest Generator</h2>

    <div id="setupForm">
      <div class="form-group">
        <label for="manifestType">Manifest Type</label>
        <select id="manifestType" onchange="resetStudentSection()">
          <option value="transport">Full Info (Name, Contact, Drop Point)</option>
          <option value="payment">Payment Receiving List (Name & Signature Space)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="hotelName">Hotel Name</label>
        <input type="text" id="hotelName" placeholder="e.g. Grand Plaza Hotel">
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="time">Time</label>
        <input type="time" id="time">
      </div>
      <div class="form-group">
        <label for="stipend">Stipend Amount (In Numbers)</label>
        <input type="text" id="stipend" placeholder="e.g. 1500">
      </div>
      <div class="form-group">
        <label for="totalStudents">Total Students</label>
        <input type="number" id="totalStudents" min="1" placeholder="Enter number of students">
      </div>
      <button type="button" onclick="generateStudentFields()">Generate Student Rows</button>
    </div>

    <div id="studentInputsSection" style="display: none;">
      <h3>Student Details</h3>
      <div id="tableHeader" class="student-row" style="font-weight: bold; margin-bottom: 5px;">
        </div>
      <div id="dynamicRowsContainer"></div>
      <br>
      <button type="button" onclick="generateLibraryPDF()" style="background-color: #e67e22;">Download Clean PDF</button>
    </div>
  </div>

  <script>
    function resetStudentSection() {
      document.getElementById('studentInputsSection').style.display = 'none';
      document.getElementById('dynamicRowsContainer').innerHTML = '';
    }

    function generateStudentFields() {
      const count = parseInt(document.getElementById('totalStudents').value);
      const type = document.getElementById('manifestType').value;
      
      if (!count || count < 1) {
        alert('Please enter a valid number of students.');
        return;
      }

      const headerContainer = document.getElementById('tableHeader');
      const container = document.getElementById('dynamicRowsContainer');
      
      container.innerHTML = '';
      headerContainer.className = `student-row manifest-${type}`;

      // Build Headers dynamically
      if (type === 'transport') {
        headerContainer.style.textAlign = 'center';
        headerContainer.innerHTML = `
          <div>Student Name</div>
          <div>Contact</div>
          <div>Dropping Point</div>
        `;
      } else {
        headerContainer.style.textAlign = 'left';
        headerContainer.innerHTML = `
          <div style="padding-left: 5px;">Student Name</div>
        `;
      }

      // Build input fields rows dynamically
      for (let i = 0; i < count; i++) {
        const row = document.createElement('div');
        row.className = `student-row manifest-${type}`;
        
        if (type === 'transport') {
          row.innerHTML = `
            <input type="text" class="stud-name" placeholder="Name ${i + 1}" required>
            <input type="text" class="stud-contact" placeholder="Contact ${i + 1}" required>
            <input type="text" class="stud-dropping" placeholder="Dropping Point" required>
          `;
        } else {
          row.innerHTML = `
            <input type="text" class="stud-name" placeholder="Name ${i + 1}" required>
          `;
        }
        container.appendChild(row);
      }

      document.getElementById('studentInputsSection').style.display = 'block';
    }

    function generateLibraryPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: 'p',
        unit: 'mm',
        format: 'a4'
      });

      const type = document.getElementById('manifestType').value;
      const hotelName = (document.getElementById('hotelName').value || 'N/A').toUpperCase();
      const rawDate = document.getElementById('date').value;
      const time = document.getElementById('time').value || 'N/A';
      const rawStipend = document.getElementById('stipend').value || '0';
      const stipend = Number(rawStipend);

      let formattedDate = 'N/A';
      if (rawDate) {
        const dateParts = rawDate.split('-');
        if (dateParts.length === 3) {
          formattedDate = `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}`;
        }
      }

      // Main Header Title
      doc.setFont("Helvetica", "Bold");
      doc.setFontSize(22);
      doc.text(hotelName, 105, 20, { align: "center" });

      // Conditionally inject "PAYMENT RECEIVING LIST" subtitle if selected
      let startYTable = 60;
      if (type === 'payment') {
        doc.setFontSize(14);
        doc.text("PAYMENT LIST", 105, 28, { align: "center" });
        
        doc.setFont("Helvetica", "Normal");
        doc.setFontSize(11);
        doc.text(`Date: ${formattedDate}`, 105, 36, { align: "center" });
        doc.text(`Time: ${time}`, 105, 42, { align: "center" });
        doc.text(`Stipend: Rs.${stipend}`, 105, 48, { align: "center" });
        startYTable = 55; // Adjust placement slightly down for structural symmetry
      } else {
        doc.setFont("Helvetica", "Normal");
        doc.setFontSize(11);
        doc.text(`Date: ${formattedDate}`, 105, 28, { align: "center" });
        doc.text(`Time: ${time}`, 105, 34, { align: "center" });
        doc.text(`Stipend: Rs.${stipend}`, 105, 40, { align: "center" });
        startYTable = 48;
      }

      // Gather Form Data
      const names = document.querySelectorAll('.stud-name');
      const tableBodyData = [];
      let tableHeaders = [];

      if (type === 'transport') {
        tableHeaders = [['NAME', 'CONTACT', 'DROPPING']];
        const contacts = document.querySelectorAll('.stud-contact');
        const droppings = document.querySelectorAll('.stud-dropping');

        names.forEach((nameInput, index) => {
          tableBodyData.push([
            nameInput.value || '',
            contacts[index].value || '',
            droppings[index].value || ''
          ]);
        });
      } else {
        tableHeaders = [['STUDENT NAME', 'SIGNATURE / REMARKS']];
        names.forEach((nameInput) => {
          tableBodyData.push([
            nameInput.value || '',
            '' // Leaves clean canvas for physical confirmation
          ]);
        });
      }

      // Base Structural Setup Engine
      const autoTableOptions = {
        startY: startYTable,
        head: tableHeaders,
        body: tableBodyData,
        theme: 'plain',
        styles: {
          font: 'Helvetica',
          fontSize: 10,
          lineColor: [50, 50, 50],
          lineWidth: 0.2,
          halign: 'center'
        },
        headStyles: {
          fontStyle: 'bold',
          fillColor: false,
          textColor: [0, 0, 0],
          fontSize: 10.5,
        },
        margin: { top: 20, left: 15, right: 15 }
      };

      // Configuration for spacing and proportions
      if (type === 'payment') {
        autoTableOptions.styles.cellPadding = 2; // Deep cell size for handwriting support
        autoTableOptions.columnStyles = {
          0: { halign: 'center', cellWidth: 80 }, 
          1: { cellWidth: 100 } 
        };
      } else {
        autoTableOptions.styles.cellPadding = 1;
        autoTableOptions.columnStyles = {};
      }

      doc.autoTable(autoTableOptions);

      const fileTypeSuffix = type === 'payment' ? 'Payment_Receiving_List' : 'Dropping_Manifest';
      doc.save(`${hotelName.replace(/\s+/g, '_')}_${fileTypeSuffix}_${formattedDate}.pdf`);
    }
  </script>

</body>

</html>
